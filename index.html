<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTConsulting — AI & Sustainability</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #eceee9;
    --text: #2b2e28;
    --text-muted: #6b7068;
    --accent: #1e2019;
    --green-light: #b8dbb0;
    --blue-light: #a8c8e8;
    --lavender: #c8b8e8;
    --font: 'IBM Plex Sans', sans-serif;
  }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    background: transparent;
  }

  .logo {
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text);
    text-decoration: none;
    text-transform: uppercase;
    transition: opacity 0.2s;
  }
  .logo:hover { opacity: 0.65; }


  /* ─── CHAT SECTION ─── */
  .chat-section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 40px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(160deg, #f2f4ef 0%, #e8ece4 100%);
  }

  .chat-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 55% 55% at 20% 70%, rgba(184, 219, 176, 0.4) 0%, transparent 65%),
      radial-gradient(ellipse 45% 50% at 80% 25%, rgba(168, 200, 232, 0.35) 0%, transparent 60%);
    pointer-events: none;
  }

  .chat-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 18px;
    position: relative;
  }

  .chat-headline {
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 300;
    letter-spacing: -0.02em;
    text-align: center;
    max-width: 600px;
    line-height: 1.25;
    margin-bottom: 10px;
    position: relative;
    animation: fadeUp 0.8s ease both;
  }

  .chat-sub {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 44px;
    text-align: center;
    position: relative;
    animation: fadeUp 0.8s ease 0.1s both;
  }

  /* ─── PROMPT CHIPS ─── */
  .prompt-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 800px;
    width: 100%;
    margin-bottom: 28px;
    position: relative;
    animation: fadeUp 0.8s ease 0.18s both;
  }

  .chip {
    background: rgba(255,255,255,0.75);
    border: 1px solid rgba(43,46,40,0.1);
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 13px;
    font-family: var(--font);
    font-weight: 400;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .chip:hover {
    background: rgba(255,255,255,0.95);
    border-color: rgba(43,46,40,0.22);
    transform: translateY(-1px);
  }

  /* ─── CHAT BOX ─── */
  .chat-box-wrap {
    width: 100%;
    max-width: 820px;
    position: relative;
    animation: fadeUp 0.8s ease 0.24s both;
  }

  .chat-box {
    background: rgba(255,255,255,0.82);
    border: 1px solid rgba(43,46,40,0.1);
    border-radius: 20px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.07), 0 1px 0 rgba(255,255,255,0.9) inset;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .chat-box:focus-within {
    border-color: rgba(43,46,40,0.2);
    box-shadow: 0 8px 50px rgba(0,0,0,0.1), 0 1px 0 rgba(255,255,255,0.9) inset;
  }

  .chat-textarea {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    font-family: var(--font);
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
    padding: 28px 28px 12px;
    resize: none;
    min-height: 140px;
    line-height: 1.6;
  }
  .chat-textarea::placeholder { color: #9da49a; }

  .chat-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 18px;
    border-top: 1px solid rgba(43,46,40,0.06);
  }

  .chat-model-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    background: rgba(43,46,40,0.05);
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .chat-model-badge:hover { background: rgba(43,46,40,0.09); }

  .chat-model-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: linear-gradient(135deg, #82c98a, #4aab6d);
  }

  .chat-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chat-icon-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 1px solid rgba(43,46,40,0.1);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    transition: background 0.15s, color 0.15s;
  }
  .chat-icon-btn:hover {
    background: rgba(43,46,40,0.06);
    color: var(--text);
  }
  .chat-icon-btn svg { width: 16px; height: 16px; }

  .chat-send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: #fff;
    transition: transform 0.15s, background 0.15s;
  }
  .chat-send-btn:hover {
    transform: scale(1.08);
    background: #3a3f35;
  }
  .chat-send-btn svg { width: 15px; height: 15px; }

  .chat-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 14px;
    text-align: center;
    position: relative;
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 700px) {
    header { padding: 16px 24px; }
    .hero { padding: 90px 24px 60px; }
    .hero-sub-row { flex-direction: column; gap: 32px; }
    .hero-right { font-size: 13px; }
    .chat-section { padding: 60px 20px; }
    .chat-box-wrap { max-width: 100%; }
    .chat-textarea { font-size: 15px; min-height: 120px; }
  }
</style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header>
  <a href="https://ctconsulting.framer.website/" class="logo" target="_blank" rel="noopener">CTCONSULTING</a>
</header>

<!-- ─── CHAT SECTION ─── -->
<section class="chat-section" id="chat">
  <div class="chat-label">AI Sustainability Agent</div>
  <h2 class="chat-headline">How can I help you today?</h2>
  <p class="chat-sub">Ask anything about sustainability, carbon emissions, ESG, or environmental strategy.</p>

  <div class="prompt-chips">
    <button class="chip" onclick="setPrompt(this)">Reduce our CO₂ footprint</button>
    <button class="chip" onclick="setPrompt(this)">ESG reporting strategies</button>
    <button class="chip" onclick="setPrompt(this)">Sustainable supply chain</button>
    <button class="chip" onclick="setPrompt(this)">Carbon offsetting options</button>
  </div>

  <div class="chat-box-wrap">
    <div class="chat-box">
      <textarea
        class="chat-textarea"
        id="chatInput"
        placeholder="Ask me anything about sustainability, carbon emissions, ESG reporting…"
        rows="5"
      ></textarea>
      <div class="chat-footer">
        <div class="chat-model-badge">
          <div class="chat-model-dot"></div>
          CT Agent · Beta
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4.5l3 3 3-3"/></svg>
        </div>
        <div class="chat-actions">
          <button class="chat-icon-btn" title="Attach file">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <button class="chat-send-btn" title="Send message" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <p class="chat-hint">Use <kbd style="font-family:var(--font);background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:4px;font-size:10px;">Shift + Enter</kbd> for a new line · <kbd style="font-family:var(--font);background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:4px;font-size:10px;">Enter</kbd> to send</p>
  </div>
</section>

<script>
  function setPrompt(btn) {
    const ta = document.getElementById('chatInput');
    ta.value = btn.textContent;
    ta.focus();
  }

  function sendMessage() {
    const ta = document.getElementById('chatInput');
    const msg = ta.value.trim();
    if (!msg) return;
    // Placeholder action — integrate your AI backend here
    alert('Message sent: ' + msg);
    ta.value = '';
  }

  document.getElementById('chatInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });


</script>
</body>
</html>
