<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTConsulting — AI Sustainability Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #eceee9;
    --text: #2b2e28;
    --text-muted: #6b7068;
    --accent: #1e2019;
    --font: 'IBM Plex Sans', sans-serif;
  }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ─── LAYOUT ─── */
  .page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Gradient blobs */
  .page::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 55% 55% at 15% 75%, rgba(184,219,176,0.42) 0%, transparent 65%),
      radial-gradient(ellipse 45% 50% at 82% 22%, rgba(168,200,232,0.35) 0%, transparent 60%),
      linear-gradient(160deg, #f2f4ef 0%, #e8ece4 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text);
    text-decoration: none;
    text-transform: uppercase;
    transition: opacity 0.2s;
  }
  .logo:hover { opacity: 0.6; }

  .header-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    background: rgba(255,255,255,0.6);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(43,46,40,0.08);
    backdrop-filter: blur(8px);
  }

  .dot-live {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: linear-gradient(135deg, #82c98a, #4aab6d);
    box-shadow: 0 0 0 2px rgba(130,201,138,0.3);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 2px rgba(130,201,138,0.3); }
    50%       { box-shadow: 0 0 0 5px rgba(130,201,138,0.1); }
  }

  /* ─── CHAT CONTAINER ─── */
  .chat-container {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    padding: 0 20px;
  }

  /* ─── MESSAGES AREA ─── */
  .messages-wrap {
    width: 100%;
    max-width: 780px;
    flex: 1;
    overflow-y: auto;
    padding: 24px 0 16px;
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: rgba(43,46,40,0.12) transparent;
  }
  .messages-wrap::-webkit-scrollbar { width: 4px; }
  .messages-wrap::-webkit-scrollbar-track { background: transparent; }
  .messages-wrap::-webkit-scrollbar-thumb { background: rgba(43,46,40,0.12); border-radius: 4px; }

  /* ─── AGENT LABEL ─── */
  .agent-label {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 28px;
    animation: fadeUp 0.5s ease both;
  }

  /* ─── MESSAGE BUBBLES ─── */
  .msg-row {
    display: flex;
    margin-bottom: 14px;
    animation: fadeUp 0.35s ease both;
  }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.bot  { justify-content: flex-start; }

  .bubble {
    max-width: 72%;
    padding: 14px 18px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.65;
    font-weight: 400;
  }
  .bubble.bot {
    background: rgba(255,255,255,0.82);
    border: 1px solid rgba(43,46,40,0.08);
    border-bottom-left-radius: 5px;
    color: var(--text);
    backdrop-filter: blur(12px);
    box-shadow: 0 2px 16px rgba(0,0,0,0.05);
  }
  .bubble.user {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 5px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.12);
  }

  /* Typing indicator */
  .bubble.typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 20px;
  }
  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30%            { transform: translateY(-5px); opacity: 1; }
  }

  /* ─── QUICK REPLY CHIPS ─── */
  .chips-row {
    display: flex;
    flex-wrap: wrap;
    gap: 9px;
    margin-top: 14px;
    margin-bottom: 6px;
    animation: fadeUp 0.4s ease 0.25s both;
    padding-left: 2px;
  }

  .chip {
    background: rgba(255,255,255,0.78);
    border: 1px solid rgba(43,46,40,0.13);
    border-radius: 50px;
    padding: 9px 16px;
    font-size: 13px;
    font-family: var(--font);
    font-weight: 400;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .chip:hover:not(:disabled) {
    background: rgba(255,255,255,0.97);
    border-color: rgba(43,46,40,0.25);
    transform: translateY(-1px);
    box-shadow: 0 3px 12px rgba(0,0,0,0.07);
  }
  .chip:disabled {
    opacity: 0.38;
    cursor: default;
    pointer-events: none;
  }

  /* ─── INPUT AREA ─── */
  .input-area {
    width: 100%;
    max-width: 780px;
    padding: 10px 0 22px;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }

  .chat-box {
    background: rgba(255,255,255,0.82);
    border: 1px solid rgba(43,46,40,0.1);
    border-radius: 20px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.07), 0 1px 0 rgba(255,255,255,0.9) inset;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .chat-box:focus-within {
    border-color: rgba(43,46,40,0.2);
    box-shadow: 0 8px 50px rgba(0,0,0,0.1), 0 1px 0 rgba(255,255,255,0.9) inset;
  }

  .chat-textarea {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    padding: 20px 24px 10px;
    resize: none;
    min-height: 80px;
    max-height: 180px;
    line-height: 1.6;
  }
  .chat-textarea::placeholder { color: #9da49a; }

  .chat-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 14px;
    border-top: 1px solid rgba(43,46,40,0.06);
  }

  .chat-model-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
  }

  .chat-send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: #fff;
    transition: transform 0.15s, background 0.15s, opacity 0.15s;
  }
  .chat-send-btn:hover:not(:disabled) { transform: scale(1.08); background: #3a3f35; }
  .chat-send-btn:disabled { opacity: 0.35; cursor: default; transform: none; }
  .chat-send-btn svg { width: 15px; height: 15px; }

  .chat-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 10px;
    text-align: center;
  }
  kbd {
    font-family: var(--font);
    background: rgba(0,0,0,0.06);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 10px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    header { padding: 16px 20px; }
    .header-badge span { display: none; }
    .chat-container { padding: 0 12px; }
    .bubble { max-width: 86%; font-size: 13px; }
    .chip { font-size: 12px; padding: 8px 14px; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header>
    <a href="https://ctconsulting.framer.website/" class="logo" target="_blank" rel="noopener">CTCONSULTING</a>
    <div class="header-badge">
      <div class="dot-live"></div>
      AI Sustainability Agent · Beta
    </div>
  </header>

  <!-- CHAT -->
  <div class="chat-container">
    <div class="messages-wrap" id="messagesWrap">
      <div class="agent-label">AI Sustainability Agent</div>
      <div id="messagesList"></div>
    </div>

    <div class="input-area">
      <div class="chat-box">
        <textarea
          class="chat-textarea"
          id="chatInput"
          placeholder="Type your question…"
          rows="3"
        ></textarea>
        <div class="chat-footer">
          <div class="chat-model-badge">
            <div class="dot-live"></div>
            CT Agent · Powered by Claude
          </div>
          <button class="chat-send-btn" id="sendBtn" title="Send" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
      </div>
      <p class="chat-hint"><kbd>Shift + Enter</kbd> new line &nbsp;·&nbsp; <kbd>Enter</kbd> send</p>
    </div>
  </div>

</div>
<script>
  const SYSTEM_PROMPT = `You are CT Agent, an expert AI sustainability consultant for CTConsulting — a firm that merges AI technology with deep environmental expertise. You help businesses understand and reduce their environmental impact, navigate ESG reporting, cut CO₂ emissions, build sustainable supply chains, and develop long-term sustainability strategies.

Be warm, knowledgeable, and concise. Use plain language. When relevant, mention that CTConsulting offers hands-on consulting services. Keep answers focused and practical. Use short paragraphs. Avoid bullet-heavy responses unless the user specifically needs a list. Always end with a brief follow-up question to keep the conversation going.`;

  const OPENING_MESSAGE = `Hello! I'm CT Agent, your AI sustainability consultant. 👋

I'm here to help your organisation reduce its environmental impact, navigate ESG requirements, and build a genuine sustainability strategy.

What would you like to explore today?`;

  const QUICK_QUESTIONS = [
    "How can we reduce our CO₂ footprint?",
    "Where do we start with ESG reporting?",
    "How do we build a sustainable supply chain?",
    "What are our best carbon offsetting options?"
  ];

  let history = [];    // full conversation for the API
  let chipsLocked = false;

  // ── Helpers ──────────────────────────────────────

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatText(text) {
    return escapeHtml(text)
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  function scrollBottom() {
    const w = document.getElementById('messagesWrap');
    requestAnimationFrame(() => { w.scrollTop = w.scrollHeight; });
  }

  // ── Add messages ─────────────────────────────────

  function addBotBubble(text, withChips = false) {
    const list = document.getElementById('messagesList');

    const row = document.createElement('div');
    row.className = 'msg-row bot';
    const bubble = document.createElement('div');
    bubble.className = 'bubble bot';
    bubble.innerHTML = formatText(text);
    row.appendChild(bubble);
    list.appendChild(row);

    if (withChips) {
      const chips = document.createElement('div');
      chips.className = 'chips-row';
      chips.id = 'quickChips';
      QUICK_QUESTIONS.forEach(q => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.textContent = q;
        btn.onclick = () => sendChip(q);
        chips.appendChild(btn);
      });
      list.appendChild(chips);
    }

    scrollBottom();
  }

  function addUserBubble(text) {
    const list = document.getElementById('messagesList');
    const row = document.createElement('div');
    row.className = 'msg-row user';
    const bubble = document.createElement('div');
    bubble.className = 'bubble user';
    bubble.textContent = text;
    row.appendChild(bubble);
    list.appendChild(row);
    scrollBottom();
  }

  function showTyping() {
    const list = document.getElementById('messagesList');
    const row = document.createElement('div');
    row.className = 'msg-row bot'; row.id = 'typingRow';
    const bubble = document.createElement('div');
    bubble.className = 'bubble bot typing';
    bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    row.appendChild(bubble);
    list.appendChild(row);
    scrollBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typingRow');
    if (el) el.remove();
  }

  function lockChips() {
    if (chipsLocked) return;
    chipsLocked = true;
    document.querySelectorAll('#quickChips .chip').forEach(c => c.disabled = true);
  }

  // ── API call ─────────────────────────────────────

  async function getReply(userText) {
    history.push({ role: 'user', content: userText });

    document.getElementById('sendBtn').disabled = true;
    showTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: history
        })
      });

      const data = await res.json();
      const reply = data.content?.map(b => b.text || '').join('') ||
                    'Something went wrong. Please try again.';

      history.push({ role: 'assistant', content: reply });
      hideTyping();
      addBotBubble(reply);
    } catch {
      hideTyping();
      addBotBubble('Sorry, I couldn\'t connect. Please try again in a moment.');
    } finally {
      document.getElementById('sendBtn').disabled = false;
    }
  }

  // ── User actions ─────────────────────────────────

  async function sendChip(text) {
    lockChips();
    addUserBubble(text);
    await getReply(text);
  }

  async function sendMessage() {
    const ta = document.getElementById('chatInput');
    const msg = ta.value.trim();
    if (!msg) return;
    ta.value = '';
    autoResize(ta);
    lockChips();
    addUserBubble(msg);
    await getReply(msg);
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 180) + 'px';
  }

  document.getElementById('chatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('chatInput').addEventListener('input', function () { autoResize(this); });

  // ── Auto-start: bot opens the conversation ────────

  window.addEventListener('DOMContentLoaded', () => {
    // Seed history so Claude knows the opening context
    history.push({ role: 'assistant', content: OPENING_MESSAGE });

    // Small delay for a natural feel
    setTimeout(() => {
      addBotBubble(OPENING_MESSAGE, true /* show chips */);
    }, 650);
  });
</script>
</body>
</html>
